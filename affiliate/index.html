<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="title" content="cookies website">
    <meta name="description" content="The website that cookie uses to post his amazing projects and other cool stuff">
    <meta name="keywords" content="cookies website, cookie, website, cool projects">
    <meta name="robots" content="index, follow">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="language" content="English">
    <meta name="author" content="cookie ★">
    
    <title>affiliate with cookie</title>

    <style>
        a {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        hr {
            margin: 0;
            /* border: 1px inset; */
        }
        img {
            vertical-align: -3px;
        }
        .item-list {
            overflow: auto;
            resize: both;
            max-width: 1000px;
            min-width: 340px;
            max-height: 700px;
            min-height: 58px;
        }
        button {
            cursor: pointer;
        }
        .item {
            padding: 5px;
            cursor: pointer;
        }
        .item:hover {
            background-color: rgb(255, 255, 255);
        }
        .title {
            text-decoration: underline;
            color: rgb(58, 58, 105);
        }
        .desc {
            color: inherit;
        }
    </style>
    <script defer>
        fetch('request-affiliation.json')
        .then(res => res.json())
        .then(data => {
            const list = document.querySelector('.item-list');
            data.forEach((item, index) => {
                const image = item.icon ? `<img src="${item.icon}" style="width: 16px; height: 16px;">` : '';
                const hr = index < data.length - 1 ? `<hr>` : '';
                list.innerHTML += `
                    <div class="item" onclick="window.location='${item.link}'">
                        <a href="${item.link}">
                            ${image}
                            <span class="title">${item.title} </span><span class="desc">${item.desc}</span>
                        </a>
                    </div>
                    ${hr}
                `;
            });
        });

    </script>

</head>
<body style="background-color: lightgray; color: #181818;">
    <h1 style="margin-top: 0px;">affiliate with cookie</h1>
    <div>
        <button onclick="history.back()">Back</button>
    </div>
    </div>
    <div>
        <h2 style="margin-bottom: 3px;">Links</h2>
        <div class="item-list" style="border: 1px inset; word-wrap: normal; width: 340px; background-color: rgb(236, 236, 236);">
            
        </div>
    </div>
</body>
</html>
