<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Log-in</title>
</head>
<body style="background-color: lightgray; color: #181818; margin: 0; margin-left: 5px; margin-right: 5px;">
    <h1 style="margin: 0;">Log in to admin page</h1>
    <form method="POST" style="margin-top: 10px;">
        Username: <input type="text" name="username" maxlength="256"><br>
        Password: <input type="password" name="password" style="margin-top: 10px;">
        <button type="submit">Login</button>
        {% if error %}
            <span style="color: red;">{{ error }}</span>
        {% endif %}
    </form>
    <hr>
    <div>
        Site developer: 
        <a href="https://www.youtube.com/@gdcookieoop" target="_blank">
            cookie ★ (Kwispy, Kwispy8, or gdcookieoop)
        </a>
    </div>
</body>
</html>
