<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="title" content="cookies website">
    <meta name="description" content="The website that cookie uses to post his amazing projects and other cool stuff">
    <meta name="keywords" content="cookies website, cookie, website, cool projects">
    <meta name="robots" content="index, follow">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="language" content="English">
    <meta name="author" content="cookie ★">
    
    <link rel="icon" type="image/png" href="/static/documents/images/favicon.png"/>

    <title>cookie's applications</title>

    <link rel="stylesheet" href="../../static/styles.css">
    <script defer>
        fetch('../static/documents/resources/applications.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('affiliates-list');
            data.forEach((item, index) => {
                const image = item.icon ? `<img src="${item.icon}" style="width: 16px; height: 16px;">` : '';
                const target = item.new_tab ? `target="_blank"` : '';
                const hr = index < data.length - 1 ? `<hr>` : '';
                list.innerHTML += `
                    <div class="item">
                        <a href="${item.link}" ${target}>
                            ${image}
                            <span class="title">${item.title} </span><span class="desc">${item.desc}</span>
                        </a>
                    </div>
                    ${hr}
                `;
            });
        });

    </script>

</head>
<body style="background-color: lightgray; color: #181818; margin: 0; margin-left: 5px; margin-right: 5px;">
    <h1>cookie's applications</h1>
    <div>
        <button onclick="history.back()">Back</button>
    </div>
    <div>
        <h2 style="margin-bottom: 3px;">downloads</h2>
        <div id="affiliates-list" class="item-list" style="border: 1px inset; word-wrap: normal; width: 330px; background-color: rgb(236, 236, 236);">
            
        </div>
    </div>
    <div>
        <h2>documents</h2>
        <div>
            <button onclick="window.location='/documents/multi-userWhiteboardGuide'">Multi-user Whiteboard</button>
        </div>
    </div>
</body>
</html>
